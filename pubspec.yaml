name: list_and_split
description: Shared lists, reusable templates, and expense tracking for groups.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  freezed_annotation: 2.4.4
  go_router: ^14.6.2
  intl: '>=0.18.1 <0.21.0'
  json_annotation: ^4.9.0
  path_provider: 2.1.4
  share_plus: 10.0.0
  share_plus_platform_interface: 5.0.2
  shared_preferences: 2.2.3
  supabase_flutter: 2.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0
  freezed: 2.5.2
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true
